name: Selenium SIDE Runner Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Selenium SIDE Runner
        run: npm install -g selenium-side-runner

      - name: Setup Chrome and ChromeDriver
        uses: browser-actions/setup-chrome@v2
        with:
          install-chromedriver: true
          install-dependencies: true

      - name: Run Selenium SIDE tests
        # Replace 'your-project.side' with the path to your actual .side file
        run: selenium-side-runner webtoursautomation.side -c "browserName=chrome goog:chromeOptions.args=[--headless,--disable-gpu,--no-sandbox,--disable-dev-shm-usage]"
